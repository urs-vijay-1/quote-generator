<!DOCTYPE html>
<html>
<head>

<title>Quote Generator</title>

<link rel="stylesheet" href="style.css">

<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

</head>

<body>

<div class="card">

<div class="top">

<h2>Daily Quote ✨</h2>

<i class="fa-solid fa-moon" onclick="toggleMode()" id="mode"></i>

</div>

<p id="quote">"Click refresh to generate a quote"</p>

<p id="author"></p>

<div class="icons">

<i class="fa-solid fa-copy" onclick="copyQuote()" title="Copy"></i>

<i class="fa-brands fa-x-twitter" onclick="shareTwitter()" title="Share"></i>

<i class="fa-brands fa-whatsapp" onclick="shareWhatsapp()" title="Share"></i>

</div>

<div class="refresh">

<i class="fa-solid fa-rotate-right" onclick="getQuote()"></i>

</div>

</div>

<script src="script.js"></script>

</body>
</html>
